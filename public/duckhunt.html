<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Duckhunt 2</title>
  <link rel="stylesheet" href="./css/duckhunt.css">
</head>

<body>
  <main class="main-content" id="main-content">
    <h1 id="info">Duckhunt 2</h1>
    <p class="intro-text">Välj svårighetsgrad och starta spelet!</p>
    <form class="difficulty-form" id="difficulty-form">
      <fieldset class="difficulty-fieldset">
        <legend>Svårighetsgrad</legend>
        <label class="difficulty-option">
          <input type="radio" name="difficulty" value="easy">
          <span class="difficulty-label">🟢 Lätt</span>
          <span class="difficulty-desc">Längre tid, långsammare ankor</span>
        </label>
        <label class="difficulty-option">
          <input type="radio" name="difficulty" value="normal" checked>
          <span class="difficulty-label">🟡 Normal</span>
          <span class="difficulty-desc">Balanserad utmaning</span>
        </label>
        <label class="difficulty-option">
          <input type="radio" name="difficulty" value="hard">
          <span class="difficulty-label">🔴 Svår</span>
          <span class="difficulty-desc">Kort tid, snabba ankor</span>
        </label>
      </fieldset>
      <button type="button" class="confirmButton" id="confirmButton">Starta Spelet</button>
    </form>
    <a href="project.html" class="back-link">← Tillbaka till Duckhunt 2</a>
  </main>
  <div class="game-section" id="game-section">
    <p id="score"></p>
    <div class="ankan" id="ankan"></div>
  </div>
  <script src="js/main.js"></script>
</body>

</html>
